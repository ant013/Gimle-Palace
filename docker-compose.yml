services:
  neo4j:
    image: neo4j:5.26.0@sha256:5a015e53de1895e7eee1574ae0325cf8c4b89587222778108c594bdd45a474b5
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    profiles: [review, analyze, full, code-graph]
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_initial__size: "512M"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - paperclip-agent-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_AUTH#*/} 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  palace-mcp:
    build:
      context: services/palace-mcp
      args:
        GIT_SHA: "${PALACE_GIT_SHA:-unknown}"
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    profiles: [review, analyze, full, code-graph]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      CODEBASE_MEMORY_MCP_BINARY: "${CODEBASE_MEMORY_MCP_BINARY:-}"
      PALACE_OPS_HOST: "${PALACE_OPS_HOST:-host.docker.internal}"
      PALACE_OPS_SSH_USER: "${PALACE_OPS_SSH_USER:-anton}"
      PALACE_OPS_SSH_KEY: "${PALACE_OPS_SSH_KEY:-/home/appuser/.ssh/palace_ops_id_ed25519}"
      PAPERCLIP_API_URL: "${PALACE_PAPERCLIP_API_URL:-http://host.docker.internal:3100}"
      PAPERCLIP_API_KEY: "${PAPERCLIP_API_KEY:-}"
      PALACE_SCIP_INDEX_PATHS: "${PALACE_SCIP_INDEX_PATHS:-}"
    # Non-root user for security hardening (GIM-101a, T10 — Architect F19)
    user: "1000:1000"
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8080:8000"
    volumes:
      # NOTE: real-project bind-mounts use absolute Mac paths (operator-iMac convention).
      # Non-iMac contributors should override these in docker-compose.override.yml.
      # Fixture-based mounts (relative paths under ./services/...) work cross-platform.
      - /Users/Shared/Ios/Gimle-Palace:/repos/gimle:ro
      - /Users/Shared/Android/unstoppable-wallet-android:/repos/uw-android:ro
      - ./services/palace-mcp/tests/extractors/fixtures/uw-ios-mini-project:/repos/uw-ios-mini:ro
      - /Users/Shared/Ios/unstoppable-wallet-ios:/repos/uw-ios:ro
      - ./services/palace-mcp/tests/extractors/fixtures/oz-v5-mini-project:/repos/oz-v5-mini:ro
      - codebase-memory-cache:/home/appuser/.cache/codebase-memory-mcp
      - "${HOME}/.ssh/id_ed25519:/home/appuser/.ssh/id_ed25519:ro"
      - "${HOME}/.ssh/palace_ops_id_ed25519:/home/appuser/.ssh/palace_ops_id_ed25519:ro"
      - "${HOME}/.ssh/palace_ops_id_ed25519.pub:/home/appuser/.ssh/palace_ops_id_ed25519.pub:ro"
      - "${HOME}/.ssh/known_hosts:/home/appuser/.ssh/known_hosts:ro"
      - "${HOME}/.ssh/config:/home/appuser/.ssh/config:ro"
      - palace-tantivy-data:/var/lib/palace/tantivy
    networks:
      - paperclip-agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  paperclip-agent-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  codebase-memory-cache:
  palace-tantivy-data:
