services:
  neo4j:
    image: neo4j:5.26.0@sha256:5a015e53de1895e7eee1574ae0325cf8c4b89587222778108c594bdd45a474b5
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    profiles: [review, analyze, full]
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_initial__size: "512M"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - paperclip-agent-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_AUTH#*/} 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  palace-mcp:
    build:
      context: services/palace-mcp
      args:
        GIT_SHA: "${PALACE_GIT_SHA:-unknown}"
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    profiles: [review, analyze, full]
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      # Embedder (flat form — no nested variable expansion per WARNING #4)
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-http://ollama:11434/v1}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-placeholder}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-768}"
      # LLM client (required by graphiti-core constructor; not invoked in N+1a)
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-llama3:8b}"
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8080:8000"
    networks:
      - paperclip-agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  paperclip-agent-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
