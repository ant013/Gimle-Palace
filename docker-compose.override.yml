# GIM-277 smoke: expose palace-mcp on 8888 (8080 occupied by host nginx).
# Adds hs-stage staging mount (colima can't serve /Users/Shared/ directly).
# Increases mem_limit to 2g for large SCIP ingest (290K occurrences).
# Remove this file after the smoke run.
services:
  palace-mcp:
    mem_limit: 2g
    ports:
      - "8888:8000"
    volumes:
      - /Users/anton/.cache/palace/swift-kit-mounts/hs-stage:/repos-hs-stage:ro
