name: PR Source Guard

on:
  pull_request:
    branches: [main]

jobs:
  source-branch-check:
    name: Enforce develop → main only
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-develop sources to main
        run: |
          if [[ "${{ github.head_ref }}" != "develop" ]]; then
            echo "::error::PRs to main must originate from develop; got '${{ github.head_ref }}'"
            echo ""
            echo "Only the develop → main release PR is allowed to target main."
            echo "Open your PR against 'develop' instead."
            exit 1
          fi
          echo "Source branch is 'develop' — allowed."
