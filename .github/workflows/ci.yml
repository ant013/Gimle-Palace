name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/palace-mcp/uv.lock
          python-version: "3.12"
      - run: uv sync --frozen
        working-directory: services/palace-mcp
      - run: uv run ruff check
        working-directory: services/palace-mcp
      - run: uv run ruff format --check
        working-directory: services/palace-mcp

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/palace-mcp/uv.lock
          python-version: "3.12"
      - run: uv sync --frozen
        working-directory: services/palace-mcp
      - run: uv run mypy src/
        working-directory: services/palace-mcp

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/palace-mcp/uv.lock
          python-version: "3.12"
      - run: uv sync --frozen
        working-directory: services/palace-mcp
      - run: uv run pytest
        working-directory: services/palace-mcp

  github-scripts-tests:
    name: github-scripts-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        working-directory: .github/scripts
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: .github/scripts
        run: python -m pytest tests/ -v

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - run: |
          docker buildx build services/palace-mcp \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t palace-mcp:ci \
            --load
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
