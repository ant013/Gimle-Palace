name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          working-directory: services/palace-mcp
      - run: uv run ruff check
        working-directory: services/palace-mcp
      - run: uv run ruff format --check
        working-directory: services/palace-mcp

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          working-directory: services/palace-mcp
      - run: uv run mypy src/
        working-directory: services/palace-mcp

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          working-directory: services/palace-mcp
      - run: uv run pytest
        working-directory: services/palace-mcp

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build services/palace-mcp -t palace-mcp:ci
