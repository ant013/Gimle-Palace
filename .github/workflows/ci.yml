name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/palace-mcp/uv.lock
          python-version: "3.12"
      - run: uv sync --frozen
        working-directory: services/palace-mcp
      - run: uv run ruff check
        working-directory: services/palace-mcp
      - run: uv run ruff format --check
        working-directory: services/palace-mcp

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/palace-mcp/uv.lock
          python-version: "3.12"
      - run: uv sync --frozen
        working-directory: services/palace-mcp
      - run: uv run mypy src/
        working-directory: services/palace-mcp

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/palace-mcp/uv.lock
          python-version: "3.12"
      - run: uv sync --frozen
        working-directory: services/palace-mcp
      - run: uv run pytest -m "not slow"
        working-directory: services/palace-mcp

  github-scripts-tests:
    name: github-scripts-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        working-directory: .github/scripts
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: .github/scripts
        run: python -m pytest tests/ -v

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - run: |
          docker buildx build services/palace-mcp \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t palace-mcp:ci \
            --load
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  watchdog-tests:
    name: watchdog-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/watchdog/uv.lock
          python-version: "3.12"
      - run: uv sync --all-extras
        working-directory: services/watchdog
      - run: uv run ruff check src/ tests/
        working-directory: services/watchdog
      - run: uv run ruff format --check src/ tests/
        working-directory: services/watchdog
      - run: uv run mypy --strict src/
        working-directory: services/watchdog
      - run: uv run pytest tests/ -v --cov=gimle_watchdog --cov-config=.coveragerc --cov-fail-under=85
        working-directory: services/watchdog

  paperclip-assembly:
    name: paperclip-assembly
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install pyyaml
      - name: Build gimle bundles
        run: python3 paperclips/scripts/build_project_compat.py --project gimle --inventory skip
      - name: Build trading bundles (UAA Phase B coverage expansion)
        run: |
          python3 paperclips/scripts/build_project_compat.py --project trading --target claude --inventory skip
          python3 paperclips/scripts/build_project_compat.py --project trading --target codex --inventory skip
      - name: Build uaudit bundles (UAA Phase B coverage expansion)
        run: python3 paperclips/scripts/build_project_compat.py --project uaudit --target codex --inventory skip
      - name: Validate instruction bundles
        run: python3 paperclips/scripts/validate_instructions.py --repo-root .
      - name: Validate assembly inventory
        run: python3 paperclips/scripts/generate_assembly_inventory.py --check
      - name: Validate Codex target
        run: bash paperclips/validate-codex-target.sh
      - name: Run Phase A + B test suites
        # UAA rev2 DevOps#8: Phase B tests were not in CI; compose correctness,
        # profile boundaries, determinism, build contract — all CI-invisible.
        run: |
          pip install pytest
          python3 -m pytest paperclips/tests/test_phase_a_*.py paperclips/tests/test_phase_b_*.py -v
      - name: Install validator test dependency
        run: python3 -m pip install pytest
      - name: Run validator tests
        run: python3 -m pytest paperclips/tests/test_validate_instructions.py
