# UAA Phase A — new profile vocabulary per spec §5.1.
#
# Phase A intermediate state: profiles map to fragment sets, but the
# compose_agent_prompt builder lands in Phase B. Until then, slim role files
# contain ONLY craft (identity/area/MCP/anti-patterns); profiles below are
# declarative ground-truth for Phase B builder, not active inclusions.
#
# Spec §5.1: 8 profiles — custom, minimal, research, writer, implementer,
# qa, reviewer, cto. Universal layer (karpathy + wake-and-handoff-basics +
# escalation-board) is inlined per agent by Phase B builder.
profiles:
  custom:
    fragments:
    empty_allowed: "true"
    description: |
      Opts out of universal layer. Caller composes via custom_includes in
      manifest. Total freedom; no safety floor.
  minimal:
    fragments:
    empty_allowed: "true"
    description: |
      Universal layer only (composed by Phase B builder). No capability
      content. Safety floor for any agent.
  research:
    fragments:
      - paperclips/fragments/shared/fragments/pre-work/codebase-memory-first.md
      - paperclips/fragments/shared/fragments/handoff/basics.md
    description: |
      Read-only research. Pre-work via codebase-memory. Handoff basics for
      reassigning research outputs.
  writer:
    fragments:
      - paperclips/fragments/shared/fragments/handoff/basics.md
    description: |
      Documentation-only. Handoff basics. No git/worktree (writer doesn't
      commit code).
  implementer:
    fragments:
      - paperclips/fragments/shared/fragments/git/commit-and-push.md
      - paperclips/fragments/shared/fragments/worktree/active.md
      - paperclips/fragments/shared/fragments/pre-work/codebase-memory-first.md
      - paperclips/fragments/shared/fragments/pre-work/sequential-thinking.md
      - paperclips/fragments/shared/fragments/pre-work/existing-field-semantics.md
      - paperclips/fragments/shared/fragments/handoff/basics.md
    description: |
      Engineering profile. Commit+push (NOT merge). Worktree discipline.
      Pre-work discovery. Handoff basics.
  qa:
    extends: implementer
    fragments:
      - paperclips/fragments/shared/fragments/qa/smoke-and-evidence.md
    description: |
      QA profile. Inherits implementer (qa commits test fixtures). Adds
      smoke checklist + evidence format + iMac restore-checkout.
  reviewer:
    fragments:
      - paperclips/fragments/shared/fragments/pre-work/codebase-memory-first.md
      - paperclips/fragments/shared/fragments/pre-work/sequential-thinking.md
      - paperclips/fragments/shared/fragments/git/merge-readiness.md
      - paperclips/fragments/shared/fragments/git/merge-state-decoder.md
      - paperclips/fragments/shared/fragments/code-review/approve.md
      - paperclips/fragments/shared/fragments/plan/review.md
      - paperclips/fragments/shared/fragments/handoff/basics.md
    description: |
      Review profile. Merge-readiness check. APPROVE format. Plan review.
      NO commit-and-push (reviewer doesn't write code). NO release-cut.
  cto:
    extends: reviewer
    fragments:
      - paperclips/fragments/shared/fragments/git/release-cut.md
      - paperclips/fragments/shared/fragments/handoff/phase-orchestration.md
      - paperclips/fragments/shared/fragments/plan/producer.md
    description: |
      CTO profile. Inherits reviewer (CTO also reviews). Adds release-cut
      (CTO orchestrates main releases). Phase orchestration (CTO sequences
      slice phases). Plan producer (CTO writes Board specs as plans).
