# Task 1 safety matrix. Validators in later tasks should treat this file as
# the machine-readable source of truth for required profile coverage.
roles:
  claude:blockchain-engineer:
    target: claude
    source: paperclips/roles/blockchain-engineer.md
    family: implementation
    profiles: [core, task-start, implementation, handoff]
  claude:code-reviewer:
    target: claude
    source: paperclips/roles/code-reviewer.md
    family: code-reviewer
    profiles: [core, task-start, review, qa-smoke, handoff-full, merge-deploy]
  claude:cto:
    target: claude
    source: paperclips/roles/cto.md
    family: cto
    profiles: [core, task-start, review, qa-smoke, handoff-full, merge-deploy]
  claude:infra-engineer:
    target: claude
    source: paperclips/roles/infra-engineer.md
    family: infra
    profiles: [core, task-start, implementation, handoff-full, merge-deploy]
  claude:mcp-engineer:
    target: claude
    source: paperclips/roles/mcp-engineer.md
    family: implementation
    profiles: [core, task-start, implementation, handoff]
  claude:opus-architect-reviewer:
