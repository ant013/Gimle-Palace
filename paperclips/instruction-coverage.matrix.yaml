  claude:technical-writer:
    target: claude
    source: paperclips/roles/technical-writer.md
    family: writer
    profiles: [core, task-start, research, handoff]
  codex:codex-architect-reviewer:
    target: codex
    source: paperclips/roles-codex/codex-architect-reviewer.md
    family: architect-reviewer
