    family: architect-reviewer
    profiles: [core, task-start, review, qa-smoke, research, handoff-full]
  claude:python-engineer:
    target: claude
    source: paperclips/roles/python-engineer.md
    family: implementation
    profiles: [core, task-start, implementation, handoff]
  claude:qa-engineer:
    target: claude
    source: paperclips/roles/qa-engineer.md
    family: qa
    profiles: [core, task-start, qa-smoke, implementation, handoff-full, merge-deploy]
  claude:research-agent:
